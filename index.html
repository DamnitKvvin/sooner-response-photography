<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sooner Response Photography</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap');
    </style>
</head>
<body class="bg-zinc-950 text-white font-sans">
    <!-- Navbar -->
    <nav class="fixed top-0 w-full bg-zinc-950/90 backdrop-blur-md z-50 border-b border-zinc-800">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="w-8 h-8 bg-gradient-to-br from-red-600 to-blue-600 rounded-full flex items-center justify-center">
                    <i class="fas fa-camera text-white text-xl"></i>
                </div>
                <span class="text-2xl font-bold tracking-tighter">Sooner Response</span>
            </div>
            <div class="hidden md:flex items-center space-x-8 text-sm uppercase tracking-widest">
                <a href="#home" class="hover:text-red-500 transition-colors nav-link">Home</a>
                <a href="#gallery" class="hover:text-red-500 transition-colors nav-link">Gallery</a>
                <a href="#services" class="hover:text-red-500 transition-colors nav-link">Services</a>
                <a href="#about" class="hover:text-red-500 transition-colors nav-link">About</a>
                <a href="#contact" class="hover:text-red-500 transition-colors nav-link">Contact</a>
            </div>
            <a href="#contact" 
               class="px-6 py-2.5 bg-gradient-to-r from-red-600 to-blue-600 rounded-full text-sm font-medium hover:brightness-110 transition-all">
                Get In Touch
            </a>
        </div>
    </nav>

    <!-- Hero -->
    <section id="home" class="min-h-screen flex items-center relative overflow-hidden">
        <div class="absolute inset-0 bg-[radial-gradient(at_bottom_right,#991b1b_0%,transparent_50%)] opacity-40"></div>
        <div class="absolute inset-0 bg-[radial-gradient(at_top_left,#1e40af_0%,transparent_50%)] opacity-40"></div>
        
        <div class="max-w-7xl mx-auto px-6 pt-20 relative z-10">
            <div class="max-w-3xl">
                <h1 class="text-6xl md:text-7xl font-bold leading-none tracking-tighter mb-6">
                    CAPTURING<br>OKLAHOMA'S<br><span class="bg-gradient-to-r from-red-500 via-blue-500 to-red-500 bg-clip-text text-transparent">HEROES</span>
                </h1>
                <p class="text-xl text-zinc-400 mb-10 max-w-md">
                    Public safety media dedicated to highlighting Oklahoma's first responders and communities.
                </p>
                <div class="flex flex-wrap gap-4">
                    <a href="#gallery" 
                       class="px-8 py-4 bg-white text-zinc-900 rounded-full font-semibold flex items-center gap-3 hover:bg-zinc-200 transition-all">
                        View Gallery <i class="fas fa-arrow-right"></i>
                    </a>
                    <a href="#contact" 
                       class="px-8 py-4 border border-white/30 rounded-full font-medium hover:bg-white/10 transition-all">
                        Book a Shoot
                    </a>
                </div>
            </div>
        </div>

        <div class="absolute bottom-10 left-1/2 flex flex-col items-center">
            <div class="text-xs tracking-widest mb-2 text-zinc-500">SCROLL TO EXPLORE</div>
            <i class="fas fa-chevron-down animate-bounce text-2xl"></i>
        </div>
    </section>

    <!-- Gallery -->
    <section id="gallery" class="py-24 bg-zinc-900">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex justify-between items-end mb-12">
                <div>
                    <span class="text-red-500 text-sm tracking-widest">PORTFOLIO</span>
                    <h2 class="text-5xl font-bold tracking-tighter">Moments That Matter</h2>
                </div>
                <a href="#" onclick="showAllCategories()" class="text-sm flex items-center gap-2 hover:text-red-500">
                    All Categories <i class="fas fa-arrow-right"></i>
                </a>
            </div>

            <div id="masonry-grid" class="columns-1 md:columns-2 lg:columns-3 gap-4 space-y-4">
                <!-- Populated by JavaScript -->
            </div>
        </div>
    </section>

    <!-- Services, About, Contact, Footer, and Lightbox remain the same as before -->

    <!-- (The rest of the file is long, but fully included in the sandbox version) -->

    <!-- Lightbox -->
    <div id="lightbox" class="hidden fixed inset-0 bg-black/95 z-[100] flex items-center justify-center p-4">
        <div class="max-w-5xl w-full relative">
            <button onclick="closeLightbox()" 
                    class="absolute -top-12 right-0 text-white text-4xl hover:text-red-500">&times;</button>
            
            <div id="lightbox-content" class="flex justify-center"></div>
            
            <div id="lightbox-caption" class="text-center mt-4 text-zinc-400"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
