<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Sooner Response Photography</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-zinc-950 text-zinc-100">
    <nav class="fixed top-0 w-full bg-zinc-950/95 backdrop-blur z-50 border-b border-zinc-800">
        <!-- Same navbar as index, copy-paste or make shared later -->
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-gradient-to-br from-red-600 to-blue-600 rounded-xl flex items-center justify-center">
                    <i class="fa-solid fa-shield-halved text-white"></i>
                </div>
                <span class="text-2xl font-bold tracking-tighter">Sooner Response</span>
            </div>
            <div class="flex gap-8">
                <a href="../index.html" class="nav-link">Home</a>
                <a href="index.html" class="nav-link text-red-400">Gallery</a>
                <a href="../about/index.html" class="nav-link">About</a>
                <a href="../services/index.html" class="nav-link">Services</a>
                <a href="../contact/index.html" class="nav-link">Contact</a>
            </div>
        </div>
    </nav>

    <div class="pt-24 max-w-7xl mx-auto px-6">
        <h1 class="text-6xl font-bold text-center mb-4">Gallery</h1>
        <p class="text-center text-zinc-400 mb-12">Moments of courage from Oklahoma's first responders</p>

        <!-- Category Tabs -->
        <div class="flex flex-wrap justify-center gap-4 mb-12" id="category-tabs">
            <button onclick="filterCategory('all')" class="category-btn active px-6 py-2 rounded-full bg-zinc-800 hover:bg-zinc-700">All</button>
            <button onclick="filterCategory('fire')" class="category-btn px-6 py-2 rounded-full bg-zinc-800 hover:bg-zinc-700">Fire & Rescue</button>
            <button onclick="filterCategory('ems')" class="category-btn px-6 py-2 rounded-full bg-zinc-800 hover:bg-zinc-700">EMS</button>
            <button onclick="filterCategory('law')" class="category-btn px-6 py-2 rounded-full bg-zinc-800 hover:bg-zinc-700">Law Enforcement</button>
        </div>

        <div id="masonry-gallery" class="masonry">
            <!-- Populated by JS -->
        </div>
    </div>

    <script src="../script.js"></script>
    <script>
        const photos = [
            {url: 'https://picsum.photos/id/1015/800/1200', cat: 'fire', title: 'Night Fire Operation'},
            {url: 'https://picsum.photos/id/133/800/1200', cat: 'fire', title: 'Fire Truck Response'},
            {url: 'https://picsum.photos/id/201/800/1200', cat: 'ems', title: 'Ambulance Scene'},
            {url: 'https://picsum.photos/id/251/800/1200', cat: 'law', title: 'Patrol Lights'},
            {url: 'https://picsum.photos/id/106/800/1200', cat: 'ems', title: 'Medical Response'},
            // Add 10-20 more of your actual images here later
        ];

        function renderGallery(filteredPhotos) {
            const container = document.getElementById('masonry-gallery');
            container.innerHTML = '';
            filteredPhotos.forEach(photo => {
                const div = document.createElement('div');
                div.className = 'masonry-item cursor-pointer';
                div.innerHTML = `
                    <img src="${photo.url}" onclick="openLightbox('${photo.url}')" class="w-full rounded-2xl" alt="${photo.title}">
                    <p class="text-sm text-zinc-400 mt-2 px-1">${photo.title}</p>
                `;
                container.appendChild(div);
            });
        }

        function filterCategory(cat) {
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active', 'bg-red-600', 'text-white'));
            // Simple active class
            if (cat === 'all') {
                renderGallery(photos);
            } else {
                const filtered = photos.filter(p => p.cat === cat);
                renderGallery(filtered);
            }
        }

        // Initial render
        renderGallery(photos);
    </script>
</body>
</html>
