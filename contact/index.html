<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Sooner Response Photography</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-zinc-950 text-zinc-100">
    <div class="pt-24 max-w-2xl mx-auto px-6">
        <h1 class="text-6xl font-bold text-center mb-12">Let's Work Together</h1>
        <form id="contact-form" class="space-y-6">
            <input type="text" placeholder="Your Name / Agency" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-6 py-4">
            <input type="email" placeholder="Email Address" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-6 py-4">
            <textarea placeholder="Tell us about your project..." rows="6" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-6 py-4"></textarea>
            <button type="submit" class="w-full py-4 bg-gradient-to-r from-red-600 to-blue-600 rounded-2xl font-semibold text-lg">Send Message</button>
        </form>
        <div class="mt-12 flex justify-center gap-8 text-3xl">
            <a href="https://www.facebook.com/profile.php?id=61590723851659" target="_blank" class="hover:text-red-400"><i class="fa-brands fa-facebook"></i></a>
            <a href="https://www.instagram.com/soonerresponsepics" target="_blank" class="hover:text-red-400"><i class="fa-brands fa-instagram"></i></a>
            <a href="https://www.tiktok.com/@soonerresponse" target="_blank" class="hover:text-red-400"><i class="fa-brands fa-tiktok"></i></a>
        </div>
    </div>
    <script src="../script.js"></script>
</body>
</html>
